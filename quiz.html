<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Desafio Coreia do Sul</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.15);
}

h1{
text-align:center;
color:#003478;
}

.info{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
font-weight:bold;
margin-bottom:15px;
}

#timer{
color:#C60C30;
font-size:24px;
}

#progresso{
width:100%;
height:25px;
background:#ddd;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
}

#barra{
height:100%;
width:0%;
background:#003478;
}

#pergunta{
font-size:22px;
margin-bottom:20px;
}

.opcao{
display:block;
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:8px;
background:#f0f0f0;
cursor:pointer;
font-size:16px;
text-align:left;
}

.opcao:hover{
background:#dfe8ff;
}

</style>
</head>

<body>

<div class="container">

<h1>🇰🇷 DESAFIO COREIA DO SUL 🇰🇷</h1>

<div class="info">
<div id="participante"></div>
<div id="questaoAtual"></div>
<div id="timer">20</div>
</div>

<div id="progresso">
<div id="barra"></div>
</div>

<div id="pergunta"></div>

<div id="alternativas"></div>

</div>

<script>

const perguntas = [

{
pergunta:"Qual é a capital da Coreia do Sul?",
opcoes:[
"Busan",
"Incheon",
"Seul",
"Daegu"
],
correta:2
},

{
pergunta:"Em qual continente está localizada a Coreia do Sul?",
opcoes:[
"Europa",
"África",
"Ásia",
"Oceania"
],
correta:2
},

{
pergunta:"Qual foi a melhor colocação da Coreia do Sul em uma Copa do Mundo?",
opcoes:[
"Campeã",
"Vice-campeã",
"3º Lugar",
"4º Lugar"
],
correta:3
},

{
pergunta:"Em qual Copa do Mundo a Coreia do Sul alcançou sua melhor campanha?",
opcoes:[
"1994",
"1998",
"2002",
"2010"
],
correta:2
},

{
pergunta:"Em sua melhor participação em Copas do Mundo (2002), qual seleção a Coreia do Sul eliminou nas oitavas de final?",
opcoes:[
"França",
"Itália",
"Brasil",
"Espanha"
],
correta:1
}

];

let indice=0;
let pontos=0;
let erros=[];
let tempo=20;
let cronometro;

document.getElementById("participante").innerHTML =
"👤 " + (localStorage.getItem("participante") || "Participante");

function carregarPergunta(){

if(indice >= perguntas.length){

localStorage.setItem("pontos",pontos);
localStorage.setItem("erros",JSON.stringify(erros));

document.body.innerHTML = `
<div style="max-width:800px;margin:auto;background:white;padding:30px;border-radius:10px;text-align:center;">
<h1>🏆 QUIZ CONCLUÍDO</h1>

<p><strong>${localStorage.getItem("participante")}</strong></p>

<p>Acertos: ${pontos/10}/${perguntas.length}</p>

<p>Pontuação: ${pontos} pontos</p>

<p>Questões incorretas:
${erros.length ? erros.join(", ") : "Nenhuma"}
</p>

</div>
`;

return;
}

let p = perguntas[indice];

document.getElementById("questaoAtual").innerHTML =
`Questão ${indice+1} de ${perguntas.length}`;

document.getElementById("pergunta").innerHTML =
p.pergunta;

let html="";

p.opcoes.forEach((opcao,i)=>{

html += `
<button class="opcao"
onclick="responder(${i})">
${String.fromCharCode(65+i)}) ${opcao}
</button>
`;

});

document.getElementById("alternativas").innerHTML = html;

document.getElementById("barra").style.width =
((indice)/perguntas.length)*100 + "%";

tempo=20;

document.getElementById("timer").innerHTML =
tempo + "s";

clearInterval(cronometro);

cronometro = setInterval(()=>{

tempo--;

document.getElementById("timer").innerHTML =
tempo + "s";

if(tempo<=0){

erros.push(indice+1);

proxima();

}

},1000);

}

function responder(opcao){

clearInterval(cronometro);

if(opcao === perguntas[indice].correta){

pontos += 10;

}else{

erros.push(indice+1);

}

proxima();

}

function proxima(){

indice++;

carregarPergunta();

}

carregarPergunta();

</script>

</body>
</html>
