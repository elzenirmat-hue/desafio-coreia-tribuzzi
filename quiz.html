<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz Coreia do Sul</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
text-align:center;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{
color:#003478;
}

#timer{
font-size:32px;
font-weight:bold;
color:#C60C30;
}

button{
display:block;
width:90%;
margin:10px auto;
padding:12px;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>🇰🇷 Desafio Coreia do Sul 🇰🇷</h1>

<p id="participante"></p>

<h2>Pergunta 1 de 15</h2>

<p>
Qual é a capital da Coreia do Sul?
</p>

<div id="timer">20</div>

<button onclick="responder('A')">
A) Busan
</button>

<button onclick="responder('B')">
B) Incheon
</button>

<button onclick="responder('C')">
C) Seul
</button>

<button onclick="responder('D')">
D) Daegu
</button>

</div>

<script>

document.getElementById("participante").innerHTML =
localStorage.getItem("participante");

let tempo = 20;

let cronometro = setInterval(function(){

tempo--;

document.getElementById("timer").innerHTML = tempo;

if(tempo <= 0){

clearInterval(cronometro);

alert("Tempo esgotado!");

}

},1000);

function responder(letra){

clearInterval(cronometro);

if(letra=="C"){

alert("Correto!");

}else{

alert("Incorreto!");

}

}

</script>

</body>
</html>
